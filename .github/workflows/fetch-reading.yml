name: Fetch Daily BBC Reading

on:
  schedule:
    - cron: '0 23 * * *' # 每天北京时间早上 7 点自动运行 (UTC 时间 23:00)
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击 "Run workflow" 按钮触发

jobs:
  update-articles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install RSS Parser
        run: npm install rss-parser 

      - name: Execute Fetch Script
        run: node scripts/fetch-rss.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add reading/
          # 提交信息也写得正式一点
          git commit -m "chore: fetch daily BBC reading materials" || exit 0
          git push
